<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENTINEL v3.1 - Monitor</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-pink: #ff0055;
            --bg-dark: #050505;
            --panel-bg: rgba(20, 20, 25, 0.9);
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow-x: hidden; /* Prohibido el scroll horizontal */
        }

        /* CONTENEDOR MAESTRO */
        .sentinel-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--neon-cyan);
            padding-bottom: 10px;
        }

        .stats-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }

        .stat-card {
            background: var(--panel-bg);
            border: 1px solid #333;
            padding: 10px;
            text-align: center;
        }

        /* EL ARREGLO PARA LA GRÁFICA */
        .chart-viewport {
            position: relative;
            width: 100%;       /* Ocupa todo el ancho disponible */
            height: 400px;     /* Altura fija o relativa */
            background: #0a0a0c;
            border: 1px solid #1a1a1a;
            box-sizing: border-box;
            overflow: hidden;  /* Importante para que nada se escape */
        }

        #cyberChart {
            width: 100% !important;
            height: 100% !important;
        }

        .footer {
            font-size: 0.8em;
            color: #666;
            text-align: right;
        }
    </style>
</head>
<body>

<div class="sentinel-container">
    <div class="header">
        <h1 style="color: var(--neon-pink); margin: 0;">SENTINEL v3.1</h1>
        <div class="stats-row">
            <div class="stat-card">CPU: <span style="color: var(--neon-cyan);">16%</span></div>
            <div class="stat-card">RAM: <span style="color: var(--neon-cyan);">65%</span></div>
            <div class="stat-card">RISK: <span style="color: var(--neon-pink);">MAX</span></div>
        </div>
    </div>

    <div class="chart-viewport">
        <canvas id="cyberChart"></canvas>
    </div>

    <div class="footer">
        [ NODE_STATUS: ACTIVE | ENCRYPTION: AES-256 ]
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const ctx = document.getElementById('cyberChart').getContext('2d');
    
    // Gradiente para que se vea Pro
    const gradient = ctx.createLinearGradient(0, 0, 0, 400);
    gradient.addColorStop(0, 'rgba(0, 243, 255, 0.3)');
    gradient.addColorStop(1, 'rgba(0, 243, 255, 0)');

    const myChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: Array.from({length: 20}, (_, i) => i + ":00"),
            datasets: [{
                label: 'Network Traffic',
                data: Array.from({length: 20}, () => Math.floor(Math.random() * 100)),
                borderColor: '#00f3ff',
                backgroundColor: gradient,
                borderWidth: 2,
                fill: true,
                tension: 0.4,
                pointRadius: 0
            }]
        },
        options: {
            responsive: true,           // Esta es la magia
            maintainAspectRatio: false, // Permite que use el alto del contenedor CSS
            plugins: {
                legend: { display: false }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    grid: { color: '#1a1a1a' },
                    ticks: { color: '#666' }
                },
                x: {
                    grid: { display: false },
                    ticks: { color: '#666' }
                }
            }
        }
    });

    // Forzar redibujado si la ventana cambia bruscamente
    window.addEventListener('resize', () => {
        myChart.resize();
    });
</script>

</body>
</html>
